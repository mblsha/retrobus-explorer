name: Spade Testbenches

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  detect-spade-changes:
    runs-on: ubuntu-latest
    outputs:
      spade: ${{ steps.filter.outputs.spade }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Spade-related changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            spade:
              - 'gateware/reference/spade-projects/**'
              - 'gateware/reference/binary-counter/**'
              - '.github/workflows/spade-testbenches.yml'

  run-spade-testbenches:
    needs: detect-spade-changes
    if: needs.detect-spade-changes.outputs.spade == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateware/reference/spade-projects
    env:
      CARGO_TERM_COLOR: always
      PYTHONUNBUFFERED: "1"
      SPADE_COMPILER_CACHE_ROOT: /home/runner/.cache/spade-compilers
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v1
        with:
          python-version: "3.12"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
          key: spade-swim-${{ runner.os }}-${{ hashFiles('gateware/reference/spade/src/swim/install.md') }}
          restore-keys: |
            spade-swim-${{ runner.os }}-

      - name: Cache shared Spade compiler builds
        uses: actions/cache@v4
        with:
          path: |
            /home/runner/.cache/spade-compilers
          key: spade-compilers-${{ runner.os }}-${{ hashFiles('gateware/reference/spade-projects/*/swim.lock', 'gateware/reference/binary-counter/swim.lock') }}
          restore-keys: |
            spade-compilers-${{ runner.os }}-

      - name: Install swim
        run: |
          if ! command -v swim >/dev/null 2>&1; then
            cargo install --git https://gitlab.com/spade-lang/swim swim
          fi
          swim --version

      - name: Install verilator
        run: |
          if ! command -v verilator >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y verilator
          fi
          verilator --version

      - name: Sync Python dependencies
        run: uv sync

      - name: Prepare shared compiler directories and pin swim compiler paths
        run: |
          set -euo pipefail
          python <<'PY'
          import os
          import re
          import subprocess
          from pathlib import Path

          root = Path(".").resolve()
          cache_root = Path(os.environ["SPADE_COMPILER_CACHE_ROOT"])
          cache_root.mkdir(parents=True, exist_ok=True)

          def spade_commit(lock_file: Path) -> str:
              in_spade = False
              for raw in lock_file.read_text().splitlines():
                  line = raw.strip()
                  if line == "[spade]":
                      in_spade = True
                      continue
                  if in_spade and line.startswith("[") and line.endswith("]"):
                      break
                  if in_spade and line.startswith("commit = "):
                      return line.split('"')[1]
              raise RuntimeError(f"missing [spade].commit in {lock_file}")

          def run(*cmd: str, cwd: Path | None = None) -> None:
              subprocess.run(list(cmd), cwd=str(cwd) if cwd else None, check=True)

          def ensure_compiler(commit: str) -> Path:
              compiler_dir = cache_root / commit
              if not (compiler_dir / ".git").is_dir():
                  run("git", "clone", "--recurse-submodules", "https://gitlab.com/spade-lang/spade", str(compiler_dir))
              current = subprocess.check_output(
                  ["git", "-C", str(compiler_dir), "rev-parse", "HEAD"], text=True
              ).strip()
              if current != commit:
                  run("git", "-C", str(compiler_dir), "fetch", "--all", "--tags")
                  run("git", "-C", str(compiler_dir), "checkout", "--force", commit)
              submodules = subprocess.check_output(
                  ["git", "-C", str(compiler_dir), "submodule", "status", "--recursive"], text=True
              ).splitlines()
              if current != commit or any(line.startswith(("-", "+", "U")) for line in submodules):
                  run("git", "-C", str(compiler_dir), "submodule", "update", "--init", "--recursive")
              return compiler_dir

          def set_compiler_path(swim_toml: Path, compiler_dir: Path) -> None:
              section = f"[compiler]\npath = \"{compiler_dir}\"\n"
              text = swim_toml.read_text()
              if re.search(r"(?m)^\[compiler\]\s*$", text):
                  text = re.sub(
                      r"(?ms)^\[compiler\]\s*\n.*?(?=^\[[^\]]+\]\s*$|\Z)",
                      section,
                      text,
                  )
              else:
                  if not text.endswith("\n"):
                      text += "\n"
                  text += "\n" + section
              swim_toml.write_text(text)

          projects = sorted(root.glob("*/swim.toml"))
          binary_counter_swim = root.parent / "binary-counter" / "swim.toml"
          if binary_counter_swim.is_file():
              projects.append(binary_counter_swim)
          resolved: dict[str, Path] = {}
          for swim_toml in projects:
              project_dir = swim_toml.parent
              lock_file = project_dir / "swim.lock"
              if not lock_file.is_file():
                  continue
              commit = spade_commit(lock_file)
              compiler_dir = resolved.get(commit)
              if compiler_dir is None:
                  compiler_dir = ensure_compiler(commit)
                  resolved[commit] = compiler_dir
              set_compiler_path(swim_toml, compiler_dir)
              print(f"{project_dir.name}: compiler commit {commit} -> {compiler_dir}")
          PY

      - name: Run project testbenches
        run: |
          set -euo pipefail
          projects=(
            test-minimal-spade
            pin-tester-spade
            sharp-organizer-card-spade
            sharp-pc-g850-bus-spade
            sharp-pc-g850-streaming-rom-spade
            uart-saleae-loopback-spade
          )
          for project in "${projects[@]}"; do
            echo "== Running ${project} testbench =="
            (cd "${project}" && python scripts/test_with_vcd.py)
          done

      - name: Run binary-counter testbench
        run: |
          set -euo pipefail
          echo "== Running binary-counter testbench =="
          python tools/run_tb.py --project ../binary-counter

      - name: Run shared-components testbenches
        run: |
          set -euo pipefail
          cd shared-components
          python scripts/test_all_components.py

      - name: Upload Spade waveform artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spade-waveforms-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            gateware/reference/spade-projects/*-spade/test/dump.vcd
            gateware/reference/spade-projects/*-spade/test/dump.surfer.vcd
            gateware/reference/spade-projects/*-spade/test/results.xml
            gateware/reference/binary-counter/test/dump.vcd
            gateware/reference/binary-counter/test/dump.surfer.vcd
            gateware/reference/binary-counter/test/results.xml
            gateware/reference/spade-projects/shared-components/test/waveforms/*.vcd
            gateware/reference/spade-projects/shared-components/test/waveforms/*.surfer.vcd
            gateware/reference/spade-projects/shared-components/test/waveforms/*.results.xml
          if-no-files-found: warn
          retention-days: 14

  spade-testbenches:
    runs-on: ubuntu-latest
    needs: [detect-spade-changes, run-spade-testbenches]
    if: always()
    steps:
      - name: Report required-check status
        run: |
          if [[ "${{ needs.detect-spade-changes.outputs.spade }}" != "true" ]]; then
            echo "Spade testbenches not required for this change."
            exit 0
          fi

          if [[ "${{ needs.run-spade-testbenches.result }}" == "success" ]]; then
            echo "Spade testbenches required and passed."
            exit 0
          fi

          echo "Spade testbenches were required and did not pass."
          exit 1
