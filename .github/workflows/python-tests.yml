name: Python Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  ruff-py:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: py
    steps:
    - uses: actions/checkout@v4
    - uses: astral-sh/setup-uv@v1
      with:
        python-version: '3.12'

    - name: Sync dependencies
      run: uv sync --extra dev

    - name: Run Ruff
      run: uv run ruff check .

  ruff-jitx-py:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jitx-py/pin-tester
    steps:
    - uses: actions/checkout@v4
    - uses: astral-sh/setup-uv@v1
      with:
        python-version: '3.12'

    - name: Sync dependencies
      run: uv sync --extra dev

    - name: Run Ruff
      run: uv run ruff check .

  ty-py:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: py
    steps:
    - uses: actions/checkout@v4
    - uses: astral-sh/setup-uv@v1
      with:
        python-version: '3.12'

    - name: Sync dependencies
      run: uv sync --extra dev

    - name: Run Ty
      run: uv run -- ../.github/scripts/run-ty.sh

  ty-jitx-py:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jitx-py/pin-tester
    steps:
    - uses: actions/checkout@v4
    - uses: astral-sh/setup-uv@v1
      with:
        python-version: '3.12'

    - name: Sync dependencies
      run: uv sync --extra dev

    - name: Run Ty
      run: uv run ty check .

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: py
    steps:
    - uses: actions/checkout@v4
    - uses: astral-sh/setup-uv@v1
      with:
        python-version: '3.12'

    - name: Sync dependencies
      run: uv sync --extra dev

    - name: Run tests
      run: uv run pytest

  summary:
    if: always()
    runs-on: ubuntu-latest
    name: Test Summary
    needs: [ruff-py, ruff-jitx-py, ty-py, ty-jitx-py, test]
    steps:
      - name: Check test results
        run: |
          if [[ "${{ needs.ruff-py.result }}" == "failure" || \
                "${{ needs.ruff-jitx-py.result }}" == "failure" || \
                "${{ needs.ty-py.result }}" == "failure" || \
                "${{ needs.ty-jitx-py.result }}" == "failure" || \
                "${{ needs.test.result }}" == "failure" ]]; then
            echo "One or more tests failed"
            exit 1
          else
            echo "All tests passed"
          fi
