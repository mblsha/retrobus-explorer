name: Python Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  ruff:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workdir: [py, jitx-py/pin-tester]
    defaults:
      run:
        working-directory: ${{ matrix.workdir }}
    steps:
    - uses: actions/checkout@v4
    - uses: astral-sh/setup-uv@v1
      with:
        python-version: '3.12'

    - name: Sync dependencies
      run: uv sync --extra dev

    - name: Run Ruff
      run: uv run ruff check .

  ty:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workdir: [py, jitx-py/pin-tester]
    defaults:
      run:
        working-directory: ${{ matrix.workdir }}
    steps:
    - uses: actions/checkout@v4
    - uses: astral-sh/setup-uv@v1
      with:
        python-version: '3.12'

    - name: Sync dependencies
      run: uv sync --extra dev

    - name: Run Ty
      run: |
        if [[ "${{ matrix.workdir }}" == "py" ]]; then
          uv run -- ../.github/scripts/run-ty.sh
        else
          uv run ty check .
        fi

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: py
    steps:
    - uses: actions/checkout@v4
    - uses: astral-sh/setup-uv@v1
      with:
        python-version: '3.12'

    - name: Sync dependencies
      run: uv sync --extra dev

    - name: Run tests
      run: uv run pytest

  summary:
    if: always()
    runs-on: ubuntu-latest
    name: Test Summary
    needs: [ruff, ty, test]
    steps:
      - name: Check test results
        run: |
          if [[ "${{ needs.ruff.result }}" == "failure" || "${{ needs.ty.result }}" == "failure" || "${{ needs.test.result }}" == "failure" ]]; then
            echo "One or more tests failed"
            exit 1
          else
            echo "All tests passed"
          fi
