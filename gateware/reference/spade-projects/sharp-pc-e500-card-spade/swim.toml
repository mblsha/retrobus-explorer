name = "sharp_pc_e500_card_spade"
preprocessing = ["python3 ../tools/gen_build_info.py --project ."]

[libraries]
shared_components = { path = "../shared-components" }

[constraints]
top_entity = "main_core"
extra_signals = ["data"]
acf = [
    "../../Alchitry-Labs-V2/src/main/resources/library/components/Constraints/alchitry.acf",
    "../../../shared-constraints/saleae.acf",
    "../../Alchitry-Labs-V2/src/main/resources/library/components/Constraints/ft_v1.acf",
    "constraints/pc-e500-ffc.acf",
]

[verilog]
sources = [
    "verilog/main_wrapper.v",
    "verilog/card_ram_2k_v.v",
    "../shared-components/verilog/**/*.v",
]

[tooling]
top = "main"
test_module = "test_sharp_pc_e500_card"

[simulation]
testbench_dir = "test"
