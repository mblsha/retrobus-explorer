name = "sharp_pc_g850_bus_spade"

[libraries]
shared_components = { path = "../shared-components" }
ready_valid.git = "https://gitlab.com/spade-lang/lib/ready_valid"

[constraints]
auto = true
top_entity = "main_core"

[verilog]
sources = [
    "verilog/main_wrapper.v",
    "../shared-verilog/clk_wiz_0.v",
    "../shared-components/verilog/**/*.v",
]

[tooling]
top = "main"
test_module = "test_sharp_pc_g850_bus"

[simulation]
testbench_dir = "test"
